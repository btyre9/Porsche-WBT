<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Left dark panel ──────────────────────────────────────────────────── */
    .split-left {
      position: absolute;
      left: 0; top: 0;
      width: 1040px;
      height: 920px;
      background: #0D0D0F;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Right photo panel ────────────────────────────────────────────────── */
    .split-right {
      position: absolute;
      right: 0; top: 0;
      width: 880px;
      height: 920px;
      z-index: 1;
      overflow: hidden;
    }
    .split-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 65% top;
      display: block;
    }
    /* Gradient bleeds the photo's left edge into the dark panel */
    .split-right::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to right,
        #0D0D0F 0%,
        rgba(13, 13, 15, 0.50) 12%,
        rgba(13, 13, 15, 0.00) 30%
      );
    }

    /* ── Decorative skewed bars — left edge of left panel ─────────────────── */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px;
      height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0;
      width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    /* ── Content area ─────────────────────────────────────────────────────── */
    .content-area {
      position: absolute;
      left: 100px; top: 0;
      width: 900px;
      height: 920px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 0;
    }

    /* ── Red accent bar — sits just above the slide title ───────────────── */
    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 18px;
    }

    /* DEAD CODE BELOW — kept temporarily, remove on next cleanup
    .accent-line-old {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        to right,
        var(--pds-accent) 0%,
        rgba(213, 0, 28, 0.25) 60%,
        transparent 100%
      );
    } */

    /* ── Headline ─────────────────────────────────────────────────────────── */
    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.05;
      color: var(--pds-text-primary);
      margin: 0 0 36px 0;
    }

    /* ── Two-column bullet grid ────────────────────────────────────────────── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px;
      margin-bottom: 36px;
    }
    .col-header {
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--pds-text-primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--pds-border);
    }
    .bullet-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .bullet-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.45;
      color: var(--pds-contrast-high);
    }
    .bullet-dot {
      flex-shrink: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 9px;
    }

    /* ── Callout box ──────────────────────────────────────────────────────── */
    .callout-box {
      padding: 20px 24px;
      background: rgba(26, 26, 30, 0.85);
      border-left: 4px solid var(--pds-accent);
    }
    .callout-box p {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.6;
      color: var(--pds-contrast-high);
      margin: 0;
    }
    .callout-box strong {
      color: var(--pds-text-primary);
      font-weight: var(--pds-font-weight-bold);
    }

    /* ── Entrance animation state ─────────────────────────────────────────── */
    /*    JS adds .is-visible at staggered delays on load.                    */
    .anim-block {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .anim-block.is-visible {
      opacity: 1;
      transform: none;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left dark panel -->
  <div class="split-left">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="content-area">

      <!-- Red accent bar -->
      <div class="red-accent anim-block" id="el-eyebrow" aria-hidden="true"></div>

      <!-- Headline -->
      <h2 class="headline anim-block" id="el-headline">{{SLIDE_TITLE}}</h2>

      <!-- Two-column bullet grid -->
      <div class="columns">

        <div class="anim-block" id="el-col-left">
          <div class="col-header">{{COL_LEFT_HEADER}}</div>
          <ul class="bullet-list">
{{COL_LEFT_BULLETS}}
          </ul>
        </div>

        <div class="anim-block" id="el-col-right">
          <div class="col-header">{{COL_RIGHT_HEADER}}</div>
          <ul class="bullet-list">
{{COL_RIGHT_BULLETS}}
          </ul>
        </div>

      </div>

      <!-- Callout box (optional — omit Callout-Text in storyboard to hide) -->
{{CALLOUT_HTML}}

    </div>
  </div>

  <!-- Right photo -->
  <div class="split-right">
    <img src="{{IMAGE_PATH}}" alt="" draggable="false">
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* ── Entrance: stagger blocks in, bullets start dimmed ────────────────── */
  var loadEls     = ['el-eyebrow', 'el-headline', 'el-col-left', 'el-col-right', 'el-callout']
                      .map(function (id) { return document.getElementById(id); })
                      .filter(Boolean);  /* el-callout is optional — filter removes null */
  var loadDelays  = [0, 100, 250, 380, 520];

  var bullets = Array.prototype.slice.call(document.querySelectorAll('.bullet-list li'));
  gsap.set(bullets, { filter: 'brightness(0.4)' });

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      loadEls.forEach(function (el, i) {
        setTimeout(function () { el.classList.add('is-visible'); }, loadDelays[i] || 0);
      });
    });
  });

  /* ── Audio time helper ────────────────────────────────────────────────── */
  function getAudioTime() {
    try {
      if (window.parent && window.parent.CourseRuntime) {
        var t = window.parent.CourseRuntime.getAudioCurrentTime();
        if (Number.isFinite(t) && t > 0) return t;
      }
    } catch (_) {}
    return 0;
  }

  /* ── VO cue times (seconds) — fill in after recording ─────────────────── */
  /*                                                                          */
  /*    Each entry corresponds to one bullet in DOM order:                   */
  /*    left column top→bottom, then right column top→bottom.               */
  /*    Leave as null until times are known — null entries are skipped.      */
  /*                                                                          */
  /*    To set times: play the recorded MP3, note the second at which        */
  /*    each bullet is first mentioned, and replace null with that value.    */

  var bulletTimes = {{BULLET_TIMES_ARRAY}};

  var calloutCueTime = {{CALLOUT_CUE_TIME}};  /* null until known */

  /* ── Bullet activation ────────────────────────────────────────────────── */
  var bulletFired = bulletTimes.map(function () { return false; });
  var activeIdx   = -1;

  function activateBullet(idx) {
    if (activeIdx >= 0 && bullets[activeIdx]) {
      gsap.to(bullets[activeIdx], {
        scale: 1, filter: 'brightness(1)', duration: 0.45, ease: 'power2.out', overwrite: true
      });
    }
    bullets.forEach(function (el, i) {
      if (i > idx) {
        gsap.to(el, { filter: 'brightness(0.4)', duration: 0.4, ease: 'power2.out', overwrite: true });
      }
    });
    if (bullets[idx]) {
      gsap.to(bullets[idx], {
        scale: 1.06, filter: 'brightness(1.35)', duration: 0.4,
        ease: 'power2.out', transformOrigin: 'left center', overwrite: true
      });
    }
    activeIdx = idx;
  }

  /* ── Callout emphasis ─────────────────────────────────────────────────── */
  var elCallout       = document.getElementById('el-callout');
  var calloutFired    = false;

  function emphasizeCallout() {
    if (!elCallout) return;
    gsap.timeline()
      .to(elCallout, {
        scale: 1.02, filter: 'brightness(1.25)', borderLeftColor: '#FF001F',
        duration: 0.4, ease: 'power2.out', transformOrigin: 'left center'
      })
      .to(elCallout, {
        scale: 1, filter: 'brightness(1)', borderLeftColor: 'var(--pds-accent)',
        duration: 0.6, ease: 'power2.inOut'
      }, '+=1.2');
  }

  /* ── Tick loop ────────────────────────────────────────────────────────── */
  var virtualTime = 0;
  var lastTick    = Date.now();

  function tick() {
    var now   = Date.now();
    var delta = now - lastTick;
    lastTick  = now;

    if (!document.documentElement.classList.contains('slide-paused')) {
      var audioTime = getAudioTime();
      virtualTime   = audioTime > 0 ? audioTime : virtualTime + delta / 1000;

      bulletTimes.forEach(function (t, i) {
        if (t !== null && !bulletFired[i] && virtualTime >= t) {
          bulletFired[i] = true;
          activateBullet(i);
        }
      });

      if (calloutCueTime !== null && !calloutFired && virtualTime >= calloutCueTime) {
        calloutFired = true;
        emphasizeCallout();
      }
    }

    requestAnimationFrame(tick);
  }
  tick();

  /* ── Restore all bullets bright when VO ends ──────────────────────────── */
  /*    Detected by audio time dropping back to 0 after playing.            */
  var hadAudio = false;
  function checkEnd() {
    var t = getAudioTime();
    if (t > 0)        { hadAudio = true; }
    else if (hadAudio){ hadAudio = false; restoreAllBullets(); }
    requestAnimationFrame(checkEnd);
  }
  requestAnimationFrame(checkEnd);

  function restoreAllBullets() {
    gsap.to(bullets, { scale: 1, filter: 'brightness(1)', duration: 0.5, ease: 'power2.out', stagger: 0.04 });
  }

}());
</script>

</body>
</html>
