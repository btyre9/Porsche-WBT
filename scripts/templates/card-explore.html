<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .slide {
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Left panel — card list ───────────────────────────────────────────── */
    .cards-panel {
      flex-shrink: 0;
      width: 580px;
      height: 920px;
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      padding: 72px 60px 72px 100px;
      gap: 0;
      position: relative;
      z-index: 2;
    }

    /* Decorative left-edge bars */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px;
      height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0;
      width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    .panel-eyebrow {
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--pds-accent);
      margin-bottom: 12px;
    }

    .red-accent {
      width: 120px;
      height: 8px;
      background: var(--pds-accent);
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: var(--pds-font-size-xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.1;
      color: var(--pds-text-primary);
      margin: 0 0 40px 0;
    }

    /* ── Card tiles ──────────────────────────────────────────────────────── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .explore-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }
    .explore-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(213,0,28,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .explore-card:hover {
      border-color: rgba(213,0,28,0.45);
      background: rgba(255,255,255,0.07);
      transform: translateX(4px);
    }
    .explore-card:hover::before { opacity: 1; }
    .explore-card:active { transform: translateX(2px) scale(0.99); }
    .explore-card.is-active {
      border-color: var(--pds-accent);
      background: rgba(213,0,28,0.08);
    }
    .explore-card.is-active::before { opacity: 1; }
    .explore-card.visited .card-chip { color: var(--pds-success, #09D087); border-color: rgba(9,208,135,0.45); }
    .explore-card.visited .card-chip::after { content: ' ✓'; }

    .card-number {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(213,0,28,0.15);
      border: 1px solid rgba(213,0,28,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--pds-font-size-sm);
      font-weight: var(--pds-font-weight-bold);
      color: var(--pds-accent);
      letter-spacing: 0.04em;
    }

    .card-title {
      flex: 1;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-primary);
      line-height: 1.25;
    }

    .card-chip {
      flex-shrink: 0;
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.06em;
      color: var(--pds-text-muted);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 5px 14px;
      transition: color 0.2s, border-color 0.2s;
    }
    .explore-card.is-active .card-chip { color: var(--pds-accent); border-color: rgba(213,0,28,0.45); }

    /* ── Right panel — detail area ────────────────────────────────────────── */
    .detail-panel {
      flex: 1;
      height: 920px;
      background: #111116;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px 80px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle top-right glow */
    .detail-panel::before {
      content: '';
      position: absolute;
      top: -120px; right: -80px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(213,0,28,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0.35;
      text-align: center;
      transition: opacity 0.3s ease;
    }
    .detail-empty.is-hidden { opacity: 0; pointer-events: none; }
    .detail-empty__icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .detail-empty__text {
      font-size: var(--pds-font-size-md);
      color: var(--pds-text-muted);
    }

    .detail-content {
      display: none;
      flex-direction: column;
      gap: 28px;
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .detail-content.is-visible {
      display: flex;
      opacity: 1;
      transform: none;
    }
    .detail-content.is-animating {
      display: flex;
    }

    .detail-card-number {
      font-size: 11px;
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pds-accent);
    }

    .detail-title {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.1;
      color: var(--pds-text-primary);
      margin: 0;
    }

    .detail-divider {
      width: 80px;
      height: 3px;
      background: var(--pds-accent);
      border-radius: 2px;
    }

    /* ── Bullet list ─────────────────────────────────────────────────────── */
    .bullet-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .bullet-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: var(--pds-font-size-md);
      color: var(--pds-contrast-high);
      line-height: 1.45;
    }
    .bullet-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 9px;
    }

    /* ── Hidden card panel source data ───────────────────────────────────── */
    .card-panels-source { display: none; }

    /* ── Entrance animations ─────────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .anim-block.is-visible { opacity: 1; transform: none; }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Left cards panel -->
  <div class="cards-panel">
    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="red-accent anim-block" id="el-accent"></div>
    <h2 class="panel-title anim-block" id="el-title">{{SLIDE_TITLE}}</h2>

    <div class="cards-list" id="cards-list" role="list">
{{CARDS_HTML}}
    </div>
  </div>

  <!-- Right detail panel -->
  <div class="detail-panel" id="detail-panel">

    <div class="detail-empty" id="detail-empty">
      <div class="detail-empty__icon">&#8594;</div>
      <p class="detail-empty__text">Select a card to explore</p>
    </div>

    <div class="detail-content" id="detail-content">
      <div class="detail-card-number" id="detail-card-number"></div>
      <h3 class="detail-title" id="detail-title"></h3>
      <div class="detail-divider"></div>
      <ul class="bullet-list" id="detail-bullets"></ul>
    </div>

  </div>

</div>

<!-- Hidden source panels -->
<div class="card-panels-source" aria-hidden="true" id="card-panels-source">
{{CARD_PANELS_HTML}}
</div>

{{CARD_INIT_SCRIPT}}

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* ── Entrance animations ───────────────────────────────────────────────── */
  var entranceEls = ['el-accent', 'el-title'];
  entranceEls.forEach(function (id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    setTimeout(function () { el.classList.add('is-visible'); }, 80 + i * 120);
  });

  var cardEls = document.querySelectorAll('.explore-card');
  cardEls.forEach(function (el, i) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(12px)';
    el.style.transition = 'opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, background 0.2s';
    setTimeout(function () {
      el.style.opacity = '';
      el.style.transform = '';
    }, 200 + i * 80);
  });

  /* ── Card interaction ──────────────────────────────────────────────────── */
  var detailEmpty   = document.getElementById('detail-empty');
  var detailContent = document.getElementById('detail-content');
  var detailNum     = document.getElementById('detail-card-number');
  var detailTitle   = document.getElementById('detail-title');
  var detailBullets = document.getElementById('detail-bullets');
  var source        = document.getElementById('card-panels-source');

  var letters = ['01', '02', '03', '04', '05', '06'];
  var cards   = Array.from(document.querySelectorAll('.explore-card'));

  function showCard(label) {
    /* Find source panel */
    var panel = source ? source.querySelector('#panel-' + label) : null;
    var bulletHtml = panel ? panel.querySelector('.bullet-list').innerHTML : '';

    /* Card index for number badge */
    var cardEl = document.getElementById('card-' + label);
    var cardIdx = cards.indexOf(cardEl);
    var num = letters[cardIdx] || String(cardIdx + 1).padStart(2, '0');

    /* Card title */
    var titleEl = cardEl ? cardEl.querySelector('.card-title') : null;
    var titleText = titleEl ? titleEl.textContent : label;

    /* Update detail pane */
    detailNum.textContent   = 'Card ' + num;
    detailTitle.textContent = titleText;
    detailBullets.innerHTML = bulletHtml;

    /* Animate out then in */
    detailContent.classList.remove('is-visible');
    detailContent.classList.add('is-animating');
    detailEmpty.classList.add('is-hidden');

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        detailContent.classList.add('is-visible');
      });
    });

    /* Mark active / visited */
    cards.forEach(function (c) { c.classList.remove('is-active'); });
    if (cardEl) {
      cardEl.classList.add('is-active');
      cardEl.classList.add('visited');
    }
  }

  cards.forEach(function (card) {
    var label = card.getAttribute('data-card');
    card.addEventListener('click', function () { showCard(label); });
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showCard(label); }
    });
  });

}());
</script>

</body>
</html>
