<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    /* ── Root layout ──────────────────────────────────────────────────────── */
    .slide {
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Left dark panel ──────────────────────────────────────────────────── */
    .diagram-left {
      position: absolute;
      left: 0; top: 0;
      width: 960px;
      height: 920px;
      background: #0D0D0F;
      z-index: 2;
      overflow: hidden;
    }

    /* Decorative skewed bars */
    .deco-shapes {
      position: absolute;
      left: -28px; top: 0;
      width: 72px; height: 920px;
      z-index: 1;
      pointer-events: none;
    }
    .deco-bar {
      position: absolute;
      left: 0; width: 56px;
      background: #1A1A1E;
      transform: skewY(-8deg);
      transform-origin: top left;
    }
    .deco-bar:nth-child(1) { top: 60px;  height: 260px; }
    .deco-bar:nth-child(2) { top: 340px; height: 220px; opacity: 0.70; }
    .deco-bar:nth-child(3) { top: 580px; height: 200px; opacity: 0.45; }

    /* ── Header area ──────────────────────────────────────────────────────── */
    .header-area {
      position: absolute;
      left: 100px; top: 72px;
      width: 820px;
      z-index: 3;
    }
    .red-accent {
      width: 120px; height: 8px;
      background: var(--pds-accent);
      margin-bottom: 18px;
    }
    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.05;
      color: var(--pds-text-primary);
      margin: 0;
    }

    /* ── Diagram flow ─────────────────────────────────────────────────────── */
    .diagram-flow {
      position: absolute;
      left: 100px; top: 200px;
      width: 820px;
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 3;
    }

    .diagram-step {
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      transform: translateX(-18px);
    }

    .step-node {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--pds-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: var(--pds-font-weight-bold);
      color: #fff;
      position: relative;
      z-index: 1;
    }
    /* Problem / solution nodes get a muted style */
    .step-node.is-problem { background: #3A1A1E; border: 2px solid var(--pds-accent); }
    .step-node.is-neutral  { background: #1E2030; border: 2px solid rgba(255,255,255,0.2); }

    .step-connector {
      position: absolute;
      left: 123px;           /* aligns with node center (100px margin + 24px node-half) */
      width: 2px;
      background: linear-gradient(to bottom, var(--pds-accent) 0%, rgba(213,0,28,0.2) 100%);
      transform-origin: top center;
      transform: scaleY(0);
      opacity: 0;
    }

    .step-label {
      flex: 1;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.4;
      color: var(--pds-contrast-high);
      padding: 10px 16px;
      background: rgba(26,26,30,0.6);
      border-left: 2px solid transparent;
      transition: border-color 0.3s, color 0.3s;
    }
    .diagram-step.is-active .step-label {
      border-left-color: var(--pds-accent);
      color: var(--pds-text-primary);
    }

    /* ── Right panel — interaction ────────────────────────────────────────── */
    .diagram-right {
      position: absolute;
      right: 0; top: 0;
      width: 960px; height: 920px;
      background: #111116;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 80px 80px 60px;
      gap: 0;
    }

    /* Soft left-edge gradient blending into left panel */
    .diagram-right::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 120px; height: 100%;
      background: linear-gradient(to right, #0D0D0F 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Prompt button ────────────────────────────────────────────────────── */
    .prompt-wrap {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .prompt-eyebrow {
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--pds-accent);
      opacity: 0;
    }

    .prompt-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 20px 36px;
      background: transparent;
      border: 2px solid var(--pds-accent);
      color: var(--pds-text-primary);
      font-size: var(--pds-font-size-xl);
      font-weight: var(--pds-font-weight-bold);
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      opacity: 0;
    }
    .prompt-btn:hover  { background: rgba(213,0,28,0.12); transform: scale(1.02); }
    .prompt-btn:active { transform: scale(0.98); }
    .prompt-btn .btn-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--pds-accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .prompt-btn .btn-icon svg { width: 14px; height: 14px; fill: #fff; }

    /* ── Reveal grid ──────────────────────────────────────────────────────── */
    .reveal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-top: 28px;
    }

    .reveal-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: rgba(26,26,30,0.0);
      border: 1px solid rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(10px);
    }
    .reveal-item.is-shown {
      background: rgba(26,26,30,0.75);
    }
    .reveal-dot {
      flex-shrink: 0;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--pds-accent);
    }
    .reveal-text {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-primary);
      line-height: 1.3;
    }

    /* ── Conclusion bar ───────────────────────────────────────────────────── */
    .conclusion-bar {
      width: 100%;
      margin-top: 28px;
      padding: 18px 24px;
      background: rgba(213,0,28,0.08);
      border-left: 4px solid var(--pds-accent);
      opacity: 0;
    }
    .conclusion-bar p {
      margin: 0;
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-primary);
      line-height: 1.5;
    }

  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}" data-template="content-diagram">

  <!-- ── Left: Diagram build panel ──────────────────────────────────────── -->
  <div class="diagram-left">

    <div class="deco-shapes" aria-hidden="true">
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
      <div class="deco-bar"></div>
    </div>

    <div class="header-area">
      <div class="red-accent" id="el-accent" aria-hidden="true"></div>
      <h2 class="headline" id="el-title">{{SLIDE_TITLE}}</h2>
    </div>

    <div class="diagram-flow" id="diagram-flow">
{{DIAGRAM_STEPS_HTML}}
    </div>

  </div>

  <!-- ── Right: Interaction panel ───────────────────────────────────────── -->
  <div class="diagram-right">

    <div class="prompt-wrap" id="prompt-wrap">

      <p class="prompt-eyebrow" id="el-eyebrow">Click to explore</p>

      <button class="prompt-btn" id="prompt-btn" aria-label="{{INTERACTION_PROMPT}}">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm.75 12h-1.5V7h1.5v5zm0-6.5h-1.5v-1.5h1.5v1.5z"/></svg>
        </span>
        {{INTERACTION_PROMPT}}
      </button>

      <div class="reveal-grid" id="reveal-grid" aria-live="polite">
{{INTERACTION_REVEALS_HTML}}
      </div>

      <div class="conclusion-bar" id="conclusion-bar">
        <p>{{INTERACTION_CONCLUSION}}</p>
      </div>

    </div>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  var REVEAL_ITEMS  = Array.from(document.querySelectorAll('.reveal-item'));
  var DIAGRAM_STEPS = Array.from(document.querySelectorAll('.diagram-step'));
  var conclusionBar = document.getElementById('conclusion-bar');
  var promptBtn     = document.getElementById('prompt-btn');
  var promptEyebrow = document.getElementById('el-eyebrow');
  var revealIdx     = 0;
  var allRevealed   = false;

  /* ── Entrance: header ─────────────────────────────────────────────────── */
  var tl = gsap.timeline({ delay: 0.1 });

  tl.from('#el-accent', { scaleX: 0, transformOrigin: 'left center', duration: 0.5, ease: 'power3.out' })
    .from('#el-title',  { opacity: 0, y: 14, duration: 0.45, ease: 'power2.out' }, '-=0.25');

  /* ── Entrance: diagram steps stagger ─────────────────────────────────── */
  tl.to(DIAGRAM_STEPS, {
    opacity: 1,
    x: 0,
    duration: 0.4,
    ease: 'power2.out',
    stagger: 0.12,
  }, '-=0.1');

  /* Connectors draw in after nodes appear */
  var connectors = Array.from(document.querySelectorAll('.step-connector'));
  if (connectors.length) {
    tl.to(connectors, {
      scaleY: 1,
      opacity: 1,
      duration: 0.3,
      ease: 'power1.inOut',
      stagger: 0.1,
    }, '-=0.3');
  }

  /* ── Entrance: right panel ────────────────────────────────────────────── */
  tl.to(promptEyebrow, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, '-=0.1')
    .to(promptBtn,     { opacity: 1, y: 0, duration: 0.4,  ease: 'power2.out' }, '-=0.2');

  /* Pulse the button to invite a click */
  tl.to(promptBtn, {
    boxShadow: '0 0 0 6px rgba(213,0,28,0.18)',
    repeat: 2, yoyo: true,
    duration: 0.6, ease: 'sine.inOut',
    delay: 0.3,
  });

  /* ── Diagram active-step tracker ──────────────────────────────────────── */
  var activeStep = -1;
  function highlightStep(idx) {
    if (idx === activeStep) return;
    DIAGRAM_STEPS.forEach(function (el, i) {
      el.classList.toggle('is-active', i === idx);
    });
    activeStep = idx;
  }

  /* Auto-walk diagram steps while VO plays */
  var stepsTotal   = DIAGRAM_STEPS.length;
  var stepsWalked  = 0;
  var walkInterval = null;

  function startDiagramWalk() {
    if (walkInterval || stepsTotal === 0) return;
    highlightStep(0);
    stepsWalked = 1;
    walkInterval = setInterval(function () {
      if (stepsWalked < stepsTotal) {
        highlightStep(stepsWalked);
        stepsWalked++;
      } else {
        clearInterval(walkInterval);
        walkInterval = null;
      }
    }, 1400);
  }

  /* Start walk after VO kicks in (slide-pause.js fires 'vo-started' on window) */
  window.addEventListener('vo-started', startDiagramWalk);
  /* Fallback: start automatically after 1 s */
  setTimeout(startDiagramWalk, 1000);

  /* ── Reveal interaction ───────────────────────────────────────────────── */
  function revealNext() {
    if (revealIdx < REVEAL_ITEMS.length) {
      var item = REVEAL_ITEMS[revealIdx];
      gsap.to(item, { opacity: 1, y: 0, duration: 0.38, ease: 'power2.out' });
      item.classList.add('is-shown');
      revealIdx++;

      /* Pulse active diagram step to reinforce connection */
      var stepIdx = Math.min(Math.round(revealIdx / REVEAL_ITEMS.length * (stepsTotal - 1)), stepsTotal - 1);
      highlightStep(stepIdx);
    }

    if (revealIdx >= REVEAL_ITEMS.length && !allRevealed) {
      allRevealed = true;
      /* Show conclusion */
      gsap.to(conclusionBar, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', delay: 0.2 });
      /* Disable / dim the prompt button */
      promptBtn.setAttribute('disabled', 'true');
      promptBtn.style.opacity = '0.4';
      promptBtn.style.cursor  = 'default';
    }
  }

  promptBtn.addEventListener('click', revealNext);
  promptBtn.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); revealNext(); }
  });

}());
</script>

</body>
</html>
